<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carefolio Overlay PoC</title>
  
  <!-- Tailwind CSS für das Design -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome für die Icons (als Ersatz für Lucide, damit es in einer Datei läuft) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel um JSX im Browser zu übersetzen -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- MOCK DATA ---
    const patientData = {
      id: "P-8472",
      name: "Mme Sophie Martin",
      age: 78,
      status: "Prise en charge active",
      hospitalization: "Retour d'hospitalisation (Hôpital de Sion) le 12 Juin 2026 suite à une chute.",
      allergies: ["Pénicilline", "Iode"],
      medications: ["Paracétamol 1g (3x/j)", "Lisinopril 20mg (1x/j)", "Eliquis 5mg (2x/j)"],
      preferences: "Préfère les passages le matin entre 08h00 et 09h30. Présence de la fille le mardi.",
      agenda: "Prochain passage prévu demain à 08h15 (Soins de base + Médication)."
    };

    const anomaliesData = [
      { id: 1, type: "Temps", description: "Temps de pause > 45 min pour la tournée T-12", severity: "medium", status: "À vérifier" },
      { id: 2, type: "Compétence", description: "Prestation complexe (P-44) assignée à un profil ASSC", severity: "high", status: "Urgent" },
      { id: 3, type: "OPAS", description: "Dépassement du temps OPAS autorisé pour Mme Martin (+15 min)", severity: "medium", status: "À vérifier" }
    ];

    // --- MAIN APP COMPONENT ---
    function App() {
      const [activeTab, setActiveTab] = useState('uc03');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);

      return (
        <div className="flex h-screen text-slate-800 font-sans">
          
          {/* SIDEBAR */}
          <div className={`bg-slate-900 text-white transition-all duration-300 ${isSidebarOpen ? 'w-64' : 'w-20'} flex flex-col`}>
            <div className="p-4 flex items-center justify-between border-b border-slate-700">
              {isSidebarOpen && <span className="font-bold text-lg tracking-wider">Carefolio<span className="text-blue-400">Overlay</span></span>}
              <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1 hover:bg-slate-800 rounded">
                <i className="fas fa-bars text-xl"></i>
              </button>
            </div>
            
            <nav className="flex-1 py-4">
              <NavItem 
                icon={<i className="fas fa-user text-xl"></i>} 
                label="Dossier Patient (UC03)" 
                isActive={activeTab === 'uc03'} 
                onClick={() => setActiveTab('uc03')}
                isOpen={isSidebarOpen}
              />
              <NavItem 
                icon={<i className="fas fa-file-signature text-xl"></i>} 
                label="Capture Ordonnance (UC01)" 
                isActive={activeTab === 'uc01'} 
                onClick={() => setActiveTab('uc01')}
                isOpen={isSidebarOpen}
              />
              <NavItem 
                icon={<i className="fas fa-exclamation-triangle text-xl"></i>} 
                label="Contrôles OPAS (UC05)" 
                isActive={activeTab === 'uc05'} 
                onClick={() => setActiveTab('uc05')}
                isOpen={isSidebarOpen}
              />
            </nav>
            
            <div className="p-4 border-t border-slate-700 text-xs text-slate-400">
              {isSidebarOpen ? 'PoC CMS Martigny © 2026' : 'PoC'}
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div className="flex-1 flex flex-col overflow-hidden">
            
            {/* TOP HEADER */}
            <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6">
              <div className="flex items-center text-slate-500 bg-slate-100 px-3 py-2 rounded-md w-96">
                <i className="fas fa-search mr-2 text-lg"></i>
                <input type="text" placeholder="Rechercher un patient, document..." className="bg-transparent border-none outline-none w-full text-sm" />
              </div>
              <div className="flex items-center space-x-4">
                <span className="text-sm font-medium text-slate-600 hidden md:block">Infirmier(ère) Référent(e)</span>
                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                  IR
                </div>
              </div>
            </header>

            {/* MAIN DISPLAY */}
            <main className="flex-1 overflow-y-auto p-6 bg-slate-50">
              {activeTab === 'uc03' && <UC03Dashboard />}
              {activeTab === 'uc01' && <UC01DocumentCapture />}
              {activeTab === 'uc05' && <UC05Controls />}
            </main>
          </div>
        </div>
      );
    }

    // --- TAB COMPONENT: Navigation Item ---
    function NavItem({ icon, label, isActive, onClick, isOpen }) {
      return (
        <button 
          onClick={onClick}
          className={`w-full flex items-center p-3 my-1 transition-colors ${isActive ? 'bg-blue-600 text-white border-l-4 border-blue-300' : 'text-slate-300 hover:bg-slate-800 hover:text-white border-l-4 border-transparent'}`}
          title={label}
        >
          <div className="flex justify-center w-8">{icon}</div>
          {isOpen && <span className="ml-3 text-sm text-left truncate">{label}</span>}
        </button>
      );
    }

    // --- USE CASE 03: Synthèse automatique ---
    function UC03Dashboard() {
      const [aiSummary, setAiSummary] = useState(null);
      const [loading, setLoading] = useState(false);

      const generateSummary = () => {
        setLoading(true);
        setTimeout(() => {
          setAiSummary("Patiente de 78 ans, retour d'hospitalisation récente (chute). À surveiller : risque hémorragique (Eliquis) et interactions avec allergies connues (Pénicilline/Iode). Contexte favorable : fille présente le mardi. Aucune anomalie majeure signalée pour le passage de demain matin.");
          setLoading(false);
        }, 1500);
      };

      return (
        <div className="max-w-5xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-800 flex items-center">
                {patientData.name} 
                <span className="ml-3 px-2 py-1 bg-green-100 text-green-700 text-xs font-medium rounded-full flex items-center">
                  <i className="fas fa-check-circle mr-1"></i> {patientData.status}
                </span>
              </h1>
              <p className="text-slate-500 mt-1">ID Carefolio: {patientData.id} | Âge: {patientData.age} ans</p>
            </div>
            
            <button 
              onClick={generateSummary}
              disabled={loading || aiSummary}
              className={`flex items-center px-4 py-2 rounded-md font-medium text-sm transition-colors ${aiSummary ? 'bg-indigo-50 text-indigo-700' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}
            >
              {loading ? <i className="fas fa-sync-alt animate-spin mr-2 text-lg"></i> : <i className="fas fa-brain mr-2 text-lg"></i>}
              {aiSummary ? 'Synthèse IA générée' : 'Générer Synthèse IA'}
            </button>
          </div>

          {aiSummary && (
            <div className="bg-indigo-50 border border-indigo-100 p-5 rounded-xl shadow-sm relative overflow-hidden">
              <div className="absolute top-0 right-0 p-3 opacity-10">
                <i className="fas fa-brain text-8xl"></i>
              </div>
              <h3 className="text-indigo-800 font-bold mb-2 flex items-center">
                <i className="fas fa-brain mr-2 text-lg"></i> Synthèse Assistée (Niveau 3)
              </h3>
              <p className="text-indigo-900 leading-relaxed relative z-10">{aiSummary}</p>
              <div className="mt-3 text-xs text-indigo-500 font-semibold uppercase flex items-center">
                <i className="fas fa-info-circle mr-1"></i> Suggestion IA – À valider par le professionnel avant toute décision
              </div>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h3 className="font-bold text-slate-700 mb-4 flex items-center border-b pb-2">
                <i className="fas fa-heartbeat mr-2 text-blue-500 text-lg"></i> Situation Actuelle
              </h3>
              <p className="text-sm text-slate-600 leading-relaxed">{patientData.hospitalization}</p>
            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h3 className="font-bold text-slate-700 mb-4 flex items-center border-b pb-2">
                <i className="fas fa-file-alt mr-2 text-red-500 text-lg"></i> Informations Cliniques
              </h3>
              <div className="mb-4">
                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Allergies connues</span>
                <div className="flex gap-2 mt-1">
                  {patientData.allergies.map(a => (
                    <span key={a} className="px-2 py-1 bg-red-50 text-red-600 text-xs rounded border border-red-100">{a}</span>
                  ))}
                </div>
              </div>
              <div>
                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Médication active</span>
                <ul className="mt-1 space-y-1">
                  {patientData.medications.map(m => (
                    <li key={m} className="text-sm text-slate-600 flex items-start">
                      <span className="text-slate-400 mr-2">•</span> {m}
                    </li>
                  ))}
                </ul>
              </div>
            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h3 className="font-bold text-slate-700 mb-4 flex items-center border-b pb-2">
                <i className="fas fa-clock mr-2 text-orange-500 text-lg"></i> Contexte & Préférences
              </h3>
              <p className="text-sm text-slate-600 leading-relaxed">{patientData.preferences}</p>
            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
              <h3 className="font-bold text-slate-700 mb-4 flex items-center border-b pb-2">
                <i className="fas fa-calendar-alt mr-2 text-teal-500 text-lg"></i> Prochaines Interventions
              </h3>
              <p className="text-sm text-slate-600 leading-relaxed">{patientData.agenda}</p>
            </div>
          </div>
          <div className="text-center text-xs text-slate-400 mt-4">
            Vue en lecture seule – Source de vérité : Carefolio
          </div>
        </div>
      );
    }

    // --- USE CASE 01: Capture Documentaire ---
    function UC01DocumentCapture() {
      const [step, setStep] = useState(1);

      const handleUpload = () => {
        setStep(2);
        setTimeout(() => setStep(3), 2500);
      };

      const handleValidate = () => {
        alert("Document intégré avec succès dans Carefolio via le DIH !");
        setStep(1);
      };

      return (
        <div className="max-w-4xl mx-auto">
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-slate-800">Gestion Documentaire (UC01)</h1>
            <p className="text-slate-500">Capture terrain & Extraction intelligente (LLM Mistral)</p>
          </div>

          <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 min-h-[400px] flex flex-col">
            {step === 1 && (
              <div className="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer" onClick={handleUpload}>
                <div className="p-4 bg-white rounded-full shadow-sm mb-4">
                  <i className="fas fa-upload text-blue-500 text-3xl"></i>
                </div>
                <h3 className="font-bold text-slate-700 text-lg mb-2">Capturer une ordonnance</h3>
                <p className="text-sm text-slate-500 mb-6 text-center max-w-sm">
                  Prenez une photo depuis la tablette oder importez un PDF. Les métadonnées seront extraites automatiquement.
                </p>
                <button className="bg-blue-600 text-white px-6 py-2 rounded-md font-medium shadow-sm hover:bg-blue-700 transition-colors">
                  Simuler l'upload d'un document
                </button>
              </div>
            )}

            {step === 2 && (
              <div className="flex-1 flex flex-col items-center justify-center">
                <div className="relative mb-6">
                  <div className="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                  <i className="fas fa-brain absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-blue-600 text-2xl"></i>
                </div>
                <h3 className="font-bold text-slate-700 text-lg">Analyse Mistral AI en cours...</h3>
                <p className="text-sm text-slate-500 mt-2">Extraction de l'entité patient et des actes prescrits.</p>
              </div>
            )}

            {step === 3 && (
              <div className="flex-1">
                <div className="flex items-center justify-between mb-6 pb-4 border-b">
                  <h3 className="font-bold text-slate-800 flex items-center">
                    <i className="fas fa-check-circle text-green-500 mr-2 text-xl"></i> Données extraites avec succès
                  </h3>
                  <span className="bg-green-100 text-green-800 text-xs px-2 py-1 rounded font-bold">Confiance: 94%</span>
                </div>
                
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  <div className="bg-slate-100 rounded-lg p-2 border border-slate-200 flex items-center justify-center h-64 relative">
                     <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                        <i className="fas fa-file-alt text-5xl mb-2 opacity-50"></i>
                        <span className="text-sm font-medium">ordonnance_scan_102.pdf</span>
                     </div>
                  </div>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="text-xs text-slate-500 font-semibold uppercase">Patient identifié</label>
                      <div className="bg-white border border-slate-300 rounded p-2 text-sm mt-1 flex justify-between items-center font-medium">
                        Sophie Martin <span className="text-xs text-slate-400">ID: P-8472</span>
                      </div>
                    </div>
                    <div>
                      <label className="text-xs text-slate-500 font-semibold uppercase">Médecin prescripteur</label>
                      <div className="bg-white border border-slate-300 rounded p-2 text-sm mt-1">
                        Dr. Jean Dupont
                      </div>
                    </div>
                    <div>
                      <label className="text-xs text-slate-500 font-semibold uppercase">Catégorie documentaire</label>
                      <div className="bg-white border border-slate-300 rounded p-2 text-sm mt-1">
                        Ordonnance de médication
                      </div>
                    </div>
                    
                    <div className="pt-4 flex gap-3">
                      <button onClick={() => setStep(1)} className="flex-1 px-4 py-2 bg-slate-100 text-slate-600 rounded-md font-medium text-sm hover:bg-slate-200">
                        Rejeter
                      </button>
                      <button onClick={handleValidate} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-md font-medium text-sm hover:bg-blue-700">
                        Valider & Envoyer
                      </button>
                    </div>
                    <div className="text-xs text-center text-slate-400 mt-2 flex justify-center items-center">
                      <i className="fas fa-info-circle mr-1"></i> Validation humaine requise (Principe Échelon 3)
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- USE CASE 05: Contrôle assisté ---
    function UC05Controls() {
      return (
        <div className="max-w-5xl mx-auto">
          <div className="mb-6 flex flex-col md:flex-row justify-between md:items-end gap-2">
            <div>
              <h1 className="text-2xl font-bold text-slate-800">Contrôle des données (UC05)</h1>
              <p className="text-slate-500">Détection d'anomalies basées sur des règles métier (Niveau 2)</p>
            </div>
            <div className="flex gap-2">
               <span className="bg-slate-200 text-slate-700 text-xs px-3 py-1 rounded-full font-semibold">Semaine 24</span>
               <span className="bg-red-100 text-red-700 text-xs px-3 py-1 rounded-full font-semibold">3 Alertes</span>
            </div>
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto">
            <table className="w-full text-left border-collapse min-w-[600px]">
              <thead>
                <tr className="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500">
                  <th className="p-4 font-semibold w-12">Niveau</th>
                  <th className="p-4 font-semibold w-32">Catégorie</th>
                  <th className="p-4 font-semibold">Description de l'anomalie</th>
                  <th className="p-4 font-semibold w-32">Statut</th>
                  <th className="p-4 font-semibold text-right w-24">Action</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {anomaliesData.map((anomaly) => (
                  <tr key={anomaly.id} className="hover:bg-slate-50 transition-colors">
                    <td className="p-4 text-center">
                      {anomaly.severity === 'high' ? (
                        <div className="w-3 h-3 rounded-full bg-red-500 inline-block"></div>
                      ) : (
                        <div className="w-3 h-3 rounded-full bg-orange-400 inline-block"></div>
                      )}
                    </td>
                    <td className="p-4 text-sm font-medium text-slate-700">{anomaly.type}</td>
                    <td className="p-4 text-sm text-slate-600">{anomaly.description}</td>
                    <td className="p-4">
                      <span className={`text-xs px-2 py-1 rounded-md font-medium whitespace-nowrap ${anomaly.status === 'Urgent' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-orange-50 text-orange-600 border border-orange-100'}`}>
                        {anomaly.status}
                      </span>
                    </td>
                    <td className="p-4 text-right">
                      <button className="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center justify-end w-full">
                        Résoudre <i className="fas fa-chevron-right ml-1 text-xs"></i>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="p-4 bg-slate-50 border-t border-slate-200 text-sm text-slate-500 italic">
              Note : Les corrections validées ici devront être saisies manuellement dans Carefolio (Phase 1) ou seront réintégrées automatiquement après validation (Phase 2).
            </div>
          </div>
        </div>
      );
    }

    // React in das HTML rendern
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
